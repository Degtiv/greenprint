name: Build and Release Apps
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  # Сборка для macOS
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name || inputs.version }}
          releaseName: 'iPhone Sales Chart ${{ github.ref_name || inputs.version }}'
          releaseBody: |
            ## 📱 iPhone Sales Chart
            
            Приложение для просмотра статистики продаж iPhone по годам.
            
            ### Установка
            - **macOS**: Скачайте `.dmg` файл, откройте и перетащите приложение в папку Applications
            - **macOS (M1/M2/M3)**: Используйте `aarch64.dmg` для Apple Silicon
            - **macOS (Intel)**: Используйте `x64.dmg` для Intel Mac
            
            ### Особенности
            - 📊 Интерактивная столбчатая диаграмма
            - 📈 Данные о продажах iPhone с 2007 по 2017
            - 🎨 Современный дизайн
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

  # Сборка для Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name || inputs.version }}
          releaseName: 'iPhone Sales Chart ${{ github.ref_name || inputs.version }}'
          releaseBody: |
            ## 📱 iPhone Sales Chart
            
            Приложение для просмотра статистики продаж iPhone по годам.
            
            ### Установка
            - **Windows**: Скачайте `.msi` файл и запустите установщик
            - **Windows**: Или скачайте `.exe` файл для портативной версии
            
            ### Особенности
            - 📊 Интерактивная столбчатая диаграмма
            - 📈 Данные о продажах iPhone с 2007 по 2017
            - 🎨 Современный дизайн
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
